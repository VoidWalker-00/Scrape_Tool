name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            bundles: deb,rpm
          - platform: windows-latest
            bundles: nsis,msi
          - platform: macos-latest
            bundles: dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Scrape Tool ${{ github.ref_name }}
          releaseBody: |
            ## Installation

            | Platform | File | Notes |
            |----------|------|-------|
            | Linux (Debian/Ubuntu) | `.deb` | `sudo dpkg -i *.deb` |
            | Linux (Fedora/RHEL) | `.rpm` | `sudo rpm -i *.rpm` |
            | Windows | `.exe` (NSIS) or `.msi` | Run installer |
            | macOS | `.dmg` | Open and drag to Applications |

            **Requires Node.js 18+ installed on your machine.**
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundles }}
